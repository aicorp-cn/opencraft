name: build and push to ACR
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set env
        run: |
          echo "REGISTRY=crpi-mmpes07n91z8fk3d.cn-hongkong.personal.cr.aliyuncs.com" >> $GITHUB_ENV
          echo "NAMESPACE=aicorp" >> $GITHUB_ENV
          echo "PWD3=AiCorpCn2026" >> $GITHUB_ENV
      #- name: Login to Aliyun ACR
      #  uses: docker/login-action@v3
      #  with:
      #    registry: crpi-mmpes07n91z8fk3d.cn-hongkong.personal.cr.aliyuncs.com
      #    username: ${{ secrets.ACR_USERNAME }}
      #    password: ${{ secrets.ACR_PASSWORD }}    
      - name: Docker login to ACR
        run: |
          if [ -z "${{ secrets.USERNAME }}" ] || [ -z "${{ secrets.PWD2 }}" ]; then
            echo "Error: USERNAME or PWD2 secrets are not set"
            exit 1
          fi
          echo "${{ env.PWD3 }}" | docker login "${{ env.REGISTRY }}" -u "${{ secrets.USERNAME }}" --password-stdin
        shell: bash
  
      #- name: Docker login to ACR
      #  run: |
      #    echo "${{ secrets.PWD2 }}" | docker login "${{ env.REGISTRY }}" -u "${{ secrets.USERNAME }}" --password-stdin
      - name: Build and Push Backend
        run: |
          IMAGE=opencraft-backend
          TAG=latest
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/$IMAGE:$TAG ./server-python
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/$IMAGE:$TAG
      - name: Build and Push Frontend
        run: |
          IMAGE=opencraft-frontend
          TAG=latest
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/$IMAGE:$TAG ./frontend-react
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/$IMAGE:$TAG
