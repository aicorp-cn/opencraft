version: '3.8'

services:
  # 前端服务 - Nginx
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - opencraft-network
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 后端服务 - FastAPI
  backend:
    build:
      context: ./server-python
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - DATABASE_URL=sqlite+aiosqlite:///./data/cache.db
    volumes:
      - backend-data:/app/data
    networks:
      - opencraft-network
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  opencraft-network:
    driver: bridge

volumes:
  backend-data:
    driver: local